services:
  postgres:
    image: postgres:16
    container_name: pulsekar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulsekar
      POSTGRES_PASSWORD: pulsekar
      POSTGRES_DB: pulsekar
    ports:
      - "5433:5432"
    volumes:
      - pulsekar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsekar -d pulsekar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulsekar_postgres_data:
